version: '2.4'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: always

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: gaming-ai-web
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    volumes:
      - ./apps/web:/app
      - /app/node_modules  # This anonymous volume is correct, but let's ensure it's not being overridden

volumes:
  ollama_data:
